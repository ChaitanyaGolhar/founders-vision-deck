<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Founder's Vision Deck</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background-color: #0f1115;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .stage {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: calc(100vh - 30px);
      position: relative;
    }
    
    .slide-frame-wrapper {
      width: 1280px;
      height: 720px;
      transform-origin: center center;
      background: white; 
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
      transition: opacity 0.2s ease;
      overflow: hidden;
      position: relative;
    }
    
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      overflow: hidden;
      display: block;
    }
    
    .loading { opacity: 0.4; }

    .controls {
      height: 70px;
      display: flex;
      align-items: center;
      gap: 24px;
      position: relative; 
      z-index: 100; 
    }
    
    button {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
    }
    
    button:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.4);
    }
    
    button:disabled {
      opacity: 0.2;
      cursor: not-allowed;
    }
    
    .counter {
      font-family: monospace;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 2px;
    }

    body.fullscreen-mode {
      background: #000;
      overflow: hidden;
    }

    body.fullscreen-mode .stage {
      height: 100vh;
      padding: 0;
    }

    body.fullscreen-mode .controls {
      display: none;
    }
  </style>
</head>
<body>

  <div class="stage">
    <div class="slide-frame-wrapper" id="frameWrapper">
      <iframe id="slideFrame" src="slides/slide_01.html" scrolling="no"></iframe>
    </div>
  </div>

  <div class="controls">
    <button id="prevBtn" onclick="prevSlide()">← Prev</button>
    <div class="counter"><span id="currentNum">1</span> / <span id="totalNum">18</span></div>
    <button id="nextBtn" onclick="nextSlide()">Next →</button>
  </div>

  <script>
    // Updated to include all 18 of your v2 slides
    const slides = [
      'slides/slide_01.html',
      'slides/slide_02.html',
      'slides/slide_03.html',
      'slides/slide_04.html',
      'slides/slide_05.html',
      'slides/slide_06.html',
      'slides/slide_07.html',
      'slides/slide_08.html',
      'slides/slide_09.html',
      'slides/slide_10.html',
      'slides/slide_11.html',
      'slides/slide_12.html',
      'slides/slide_13.html',
      'slides/slide_14.html',
      'slides/slide_15.html',
      'slides/slide_16.html',
      'slides/slide_17.html',
      'slides/slide_18.html'
    ];

    let currentSlide = 0;
    
    const frame = document.getElementById('slideFrame');
    const frameWrapper = document.getElementById('frameWrapper');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const currentNum = document.getElementById('currentNum');
    document.getElementById('totalNum').textContent = slides.length;

    let touchStartX = 0;
    let touchEndX = 0;

    function handleKeydown(e) {
      if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
        e.preventDefault(); nextSlide();
      }
      if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
        e.preventDefault(); prevSlide();
      }
      if (e.key === 'f' || e.key === 'F') { 
        e.preventDefault(); 
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
      }
    }

    document.addEventListener('keydown', handleKeydown);

    function goToSlide(index) {
      if (index < 0 || index >= slides.length) return;
      currentSlide = index;
      
      frameWrapper.classList.add('loading');
      frame.src = slides[index];
      
      frame.onload = () => {
        frameWrapper.classList.remove('loading');
        
        try {
          const iframeDoc = frame.contentDocument || frame.contentWindow.document;
          
          iframeDoc.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
          }, { passive: true });

          iframeDoc.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            const swipeThreshold = 50;
            if (touchEndX < touchStartX - swipeThreshold) nextSlide();
            if (touchEndX > touchStartX + swipeThreshold) prevSlide();
          }, { passive: true });
          
          iframeDoc.addEventListener('keydown', handleKeydown);
          
          frame.focus(); 
        } catch (err) {
          console.warn("Could not attach listeners to iframe (likely testing locally with file:// protocol). Swipe/Keyboard inside iframe may not work unless running on a local server:", err);
        }
      };

      currentNum.textContent = index + 1;
      prevBtn.disabled = index === 0;
      nextBtn.disabled = index === slides.length - 1;
    }

    function nextSlide() { goToSlide(currentSlide + 1); }
    function prevSlide() { goToSlide(currentSlide - 1); }

    function scaleFrame() {
      const isFullscreen = Boolean(document.fullscreenElement);
      const paddingX = isFullscreen ? 0 : 40;
      const paddingY = isFullscreen ? 0 : 80;
      const availW = window.innerWidth - paddingX;
      const availH = window.innerHeight - paddingY;
      const scale = Math.min(availW / 1280, availH / 720);
      const finalScale = Math.min(scale, 2.2);
      frameWrapper.style.transform = `scale(${finalScale})`;
      document.body.classList.toggle('fullscreen-mode', isFullscreen);
    }

    window.addEventListener('resize', scaleFrame);
    document.addEventListener('fullscreenchange', scaleFrame);
    
    scaleFrame();
    goToSlide(0);
  </script>

</body>
</html>
