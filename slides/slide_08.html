<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>v2.0 — Slide 8 — The Insight</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--color-primary:#0EA5E9;--color-secondary:#6366F1;--color-accent:#22D3EE;--color-black:#000000;}
body{margin:0;padding:0;font-family:'Manrope',sans-serif;background-color:#FFFFFF;color:var(--color-black);}
.font-display{font-family:'Space Grotesk',sans-serif;}.font-mono{font-family:'JetBrains Mono',monospace;}
.slide-container{width:1280px;height:720px;position:relative;overflow:hidden;background-color:#FFFFFF;display:flex;flex-direction:column;}
.grid-lines{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
.corner-marker{position:absolute;width:12px;height:12px;border:2px solid var(--color-black);z-index:20;}
.corner-tl{top:24px;left:24px;border-right:none;border-bottom:none;}.corner-tr{top:24px;right:24px;border-left:none;border-bottom:none;}
.corner-bl{bottom:24px;left:24px;border-right:none;border-top:none;}.corner-br{bottom:24px;right:24px;border-left:none;border-top:none;}
.text-electric-blue{color:var(--color-primary);}.bg-electric-blue{background-color:var(--color-primary);}
</style>
</head>
<body>
<div class="slide-container">
<svg class="grid-lines" height="100%" width="100%" xmlns="http://www.w3.org/2000/svg"><defs><pattern height="64" id="smallGrid" patternUnits="userSpaceOnUse" width="64"><path d="M 64 0 L 0 0 0 64" fill="none" stroke="#F1F5F9" stroke-width="1"/></pattern></defs><rect fill="url(#smallGrid)" height="100%" width="100%"/></svg>
<div class="corner-marker corner-tl"></div><div class="corner-marker corner-tr"></div><div class="corner-marker corner-bl"></div><div class="corner-marker corner-br"></div>

<div class="absolute top-0 left-0 w-full px-16 py-10 z-20 flex justify-between items-center">
  <div class="flex items-center"><div class="w-5 h-5 bg-black mr-3"></div><p class="font-mono text-xs tracking-widest font-bold text-black uppercase">Founder Vision   </p></div>
  <div class="flex items-center space-x-4 font-mono text-xs text-gray-400"><span>ACT_03 — THE INSIGHT</span><div class="h-4 w-px bg-gray-300"></div><span class="text-electric-blue">EMOTION: REALIZATION</span></div>
</div>

<div class="relative z-10 flex flex-1 flex-col items-center justify-center px-20 text-center">
  <p class="font-mono text-xs text-electric-blue tracking-[0.3em] uppercase mb-10">&gt; the_insight.reveal()</p>

  <div class="w-20 h-1 bg-black mb-10"></div>

  <h1 class="font-display text-6xl font-bold leading-tight tracking-tight text-black mb-10 max-w-5xl">
    The biggest barrier to student success<br/>
    isn't <span class="text-gray-300 line-through decoration-red-500 decoration-4">talent.</span><br/>
    <span class="text-electric-blue">It's visibility.</span>
  </h1>

  <div class="w-20 h-1 bg-black mb-8"></div>

  <p class="font-mono text-sm text-gray-400 uppercase tracking-widest">// THIS IS OUR FOUNDER BELIEF</p>
</div>

<div class="absolute bottom-0 left-0 w-full h-14 px-16 flex items-center justify-between border-t border-gray-100 z-20 bg-white">
  <div class="font-mono text-xs text-gray-400"><span class="text-electric-blue mr-2">●</span>THE_INSIGHT — NOT_TALENT_VISIBILITY</div>
  <div class="flex items-center"><p class="font-mono text-lg font-bold mr-4">08</p><div class="w-12 h-1 bg-gray-200"><div class="h-full w-full bg-black"></div></div></div>
</div>
</div>
</body>
</html>
