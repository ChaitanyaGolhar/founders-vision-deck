<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>v2.0 — Slide 18 — Imagine</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--color-primary:#0EA5E9;--color-accent:#22D3EE;--color-black:#000000;}
*{box-sizing:border-box;}
body{margin:0;padding:0;font-family:'Manrope',sans-serif;background-color:#000000;color:#FFFFFF;}
.font-display{font-family:'Space Grotesk',sans-serif;}.font-mono{font-family:'JetBrains Mono',monospace;}
.slide-container{width:1280px;height:720px;position:relative;overflow:hidden;background-color:#000000;display:flex;flex-direction:column;align-items:center;justify-content:center;}
/* Subtle grid */
.bg-grid-dark{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:0.4;}
.corner-marker{position:absolute;width:12px;height:12px;border:2px solid #FFFFFF;z-index:20;opacity:0.3;}
.corner-tl{top:24px;left:24px;border-right:none;border-bottom:none;}.corner-tr{top:24px;right:24px;border-left:none;border-bottom:none;}
.corner-bl{bottom:24px;left:24px;border-right:none;border-top:none;}.corner-br{bottom:24px;right:24px;border-left:none;border-top:none;}
.text-electric-blue{color:var(--color-primary);}.bg-electric-blue{background-color:var(--color-primary);}
/* Glow effect */
.glow{animation:glow 4s ease-in-out infinite;}
@keyframes glow{
  0%,100%{text-shadow:0 0 20px rgba(14,165,233,0.3),0 0 40px rgba(14,165,233,0.1);}
  50%{text-shadow:0 0 30px rgba(14,165,233,0.5),0 0 60px rgba(14,165,233,0.2);}
}
.fade-in{animation:fadeIn 2s ease-in;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
</style>
</head>
<body>
<div class="slide-container">
<svg class="bg-grid-dark" height="100%" width="100%" xmlns="http://www.w3.org/2000/svg"><defs><pattern height="64" id="smallGrid" patternUnits="userSpaceOnUse" width="64"><path d="M 64 0 L 0 0 0 64" fill="none" stroke="#1E293B" stroke-width="1"/></pattern></defs><rect fill="url(#smallGrid)" height="100%" width="100%"/></svg>
<div class="corner-marker corner-tl"></div><div class="corner-marker corner-tr"></div><div class="corner-marker corner-bl"></div><div class="corner-marker corner-br"></div>

<!-- Minimal top label -->
<div class="absolute top-10 left-0 w-full px-16 z-20 flex justify-center">
  <p class="font-mono text-xs text-gray-600 tracking-[0.3em] uppercase">// end_of_transmission</p>
</div>

<!-- Center content -->
<div class="relative z-10 flex flex-col items-center justify-center text-center px-16 fade-in">
  <!-- Logo mark -->
  <div class="mb-12 flex items-center gap-3">
    <div class="w-8 h-8 bg-electric-blue relative">
      <div class="absolute top-1.5 left-1.5 w-5 h-5 bg-black"></div>
    </div>
    <div class="w-12 h-px bg-gray-700"></div>
  </div>

  <!-- The line -->
  <h1 class="font-display text-5xl font-light leading-tight tracking-tight text-white mb-2 glow" style="font-weight:300;">
    Imagine a world where<br/>
    <span class="font-bold">no student graduates</span><br/>
    <span class="text-electric-blue font-bold">invisible.</span>
  </h1>

  <!-- Divider -->
  <div class="my-12 flex items-center gap-4">
    <div class="w-16 h-px bg-gray-700"></div>
    <div class="w-2 h-2 bg-electric-blue rounded-full"></div>
    <div class="w-16 h-px bg-gray-700"></div>
  </div>

  <!-- Bottom line -->
  <p class="font-mono text-sm text-gray-500 tracking-[0.2em] uppercase">Making Talent Visible<br/><span class="text-gray-400">Before Opportunity Arrives</span></p>
</div>

<!-- Minimal bottom -->
<div class="absolute bottom-10 left-0 w-full px-16 z-20 flex justify-between items-center">
  <p class="font-mono text-[10px] text-gray-700 tracking-widest">FOUNDER_VISION_DECK_V2.0</p>
  <p class="font-mono text-[10px] text-gray-700 tracking-widest">18 / 18</p>
</div>
</div>
</body>
</html>
