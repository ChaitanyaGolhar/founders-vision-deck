<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Founder Vision Deck - Cover</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<style>
        :root {
            --color-primary: #0EA5E9;
            --color-secondary: #6366F1;
            --color-accent: #22D3EE;
            --color-black: #000000;
            --color-dark: #0F172A;
            --color-light: #F8FAFC;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Manrope', sans-serif;
            background-color: #FFFFFF;
            color: var(--color-black);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .slide-container {
            width: 1280px;
            height: 720px;
            position: relative;
            overflow: hidden;
            background-color: #FFFFFF;
            display: flex;
            flex-direction: column;
        }
        .grid-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .corner-marker {
            position: absolute;
            width: 12px;
            height: 12px;
            border: 2px solid var(--color-black);
            z-index: 20;
        }
        .corner-tl { top: 24px; left: 24px; border-right: none; border-bottom: none; }
        .corner-tr { top: 24px; right: 24px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: 24px; left: 24px; border-right: none; border-top: none; }
        .corner-br { bottom: 24px; right: 24px; border-left: none; border-top: none; }
        .text-electric-blue { color: var(--color-primary); }
        .text-indigo { color: var(--color-secondary); }
        .bg-electric-blue { background-color: var(--color-primary); }
        .bg-indigo { background-color: var(--color-secondary); }
        .bg-cyan { background-color: var(--color-accent); }
        .border-electric-blue { border-color: var(--color-primary); }
    </style>
</head>
<body>
<div class="slide-container">
<svg class="grid-lines" height="100%" width="100%" xmlns="http://www.w3.org/2000/svg">
<defs>
<pattern height="64" id="smallGrid" patternunits="userSpaceOnUse" width="64">
<path d="M 64 0 L 0 0 0 64" fill="none" stroke="#F1F5F9" stroke-width="1"></path>
</pattern>
</defs>
<rect fill="url(#smallGrid)" height="100%" width="100%"></rect>
</svg>
<div class="corner-marker corner-tl"></div>
<div class="corner-marker corner-tr"></div>
<div class="corner-marker corner-bl"></div>
<div class="corner-marker corner-br"></div>
<div class="relative z-10 flex flex-1 p-16">
<div class="w-1/2 flex flex-col justify-center pr-12">
<div class="flex items-center mb-8">
<div class="w-6 h-6 bg-black mr-3"></div>
<p class="font-mono text-sm tracking-widest font-bold text-black uppercase">Founder Vision Deck</p>
</div>
<div class="mb-8">
<h1 class="font-display text-8xl font-bold leading-tight tracking-tight text-black">
                        MAKING<br/>
<span class="text-electric-blue">TALENT</span><br/>
                        VISIBLE
                    </h1>
</div>
<div class="w-24 h-2 bg-black mb-8"></div>
<div class="mb-8 max-w-lg">
<p class="text-2xl text-gray-600 font-light leading-relaxed">
                        Every student deserves to be discovered for their potential—
                        not just their grades, connections, or luck.
                    </p>
</div>
<div class="mt-auto">
<div class="flex items-center space-x-6 text-sm font-mono text-gray-500">
<span class="flex items-center"><span class="w-3 h-3 bg-electric-blue rounded-full mr-2"></span>#0EA5E9</span>
<span class="flex items-center"><span class="w-3 h-3 bg-indigo rounded-full mr-2"></span>#6366F1</span>
<span class="flex items-center"><span class="w-3 h-3 bg-cyan rounded-full mr-2"></span>#22D3EE</span>
</div>
</div>
</div>
<div class="w-1/2 relative flex items-center justify-center">
<div class="relative w-full h-full">
<div class="absolute top-10 right-10 w-96 h-96 border-2 border-gray-100 rounded-full"></div>
<div class="absolute bottom-20 left-10 w-64 h-64 border-2 border-gray-100 rounded-full"></div>
<div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-96 h-96">
<div class="absolute top-0 right-0 w-64 h-80 bg-indigo"></div>
<div class="absolute bottom-0 left-0 w-48 h-48 bg-electric-blue rounded-full"></div>
<div class="absolute top-16 left-16 w-56 h-56 border-8 border-black bg-transparent z-10"></div>
<div class="absolute top-8 right-[-20px] w-32 h-12 bg-cyan rounded-full z-20 flex items-center justify-center shadow-lg">
<span class="font-mono text-xs font-bold text-black">v2026.01</span>
</div>
<div class="absolute bottom-[-40px] right-0 font-mono text-xs text-gray-400 text-right">
<p>X: 1280 Y: 720</p>
<p>RENDER_MODE: VISION</p>
</div>
</div>
</div>
</div>
</div>
<div class="absolute bottom-0 left-0 w-full h-16 px-16 flex items-center justify-between border-t border-gray-100 z-20 bg-white">
<div class="font-mono text-xs text-gray-400">© 2026 — MAKING TALENT VISIBLE BEFORE OPPORTUNITY ARRIVES</div>
<div class="flex items-center">
<p class="font-mono text-lg font-bold mr-4">01</p>
<div class="w-12 h-1 bg-black"></div>
</div>
</div>
</div>
</body>
</html>
